# ===============================================================
# Hexo-Next Theme Configuration - Minimal & Working
# Docs: https://theme-next.js.org/
# ===============================================================

# ---------------------------------------------------------------
# Site Information Settings
# ---------------------------------------------------------------
favicon:
  small: /favicon.svg
  medium: /favicon.svg

# ---------------------------------------------------------------
# Scheme Settings
# Options: Muse | Mist | Pisces | Gemini
# ---------------------------------------------------------------
scheme: Gemini

# ---------------------------------------------------------------
# Dark Mode
# ---------------------------------------------------------------
darkmode: true

# ---------------------------------------------------------------
# Menu Settings
# ---------------------------------------------------------------
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th

# ---------------------------------------------------------------
# Sidebar Settings
# ---------------------------------------------------------------
sidebar:
  position: left
  width: 240
  padding: 18

# ---------------------------------------------------------------
# Post Settings
# ---------------------------------------------------------------
post:
  copyright:
    enable: false

# ---------------------------------------------------------------
# Code Block Settings
# ---------------------------------------------------------------
codeblock:
  highlight:
    theme:
      light: default
      dark: tomorrow-night
  copy_button:
    enable: true
    style: mac

# ---------------------------------------------------------------
# Footer Settings
# ---------------------------------------------------------------
footer:
  since: 2026
  icon:
    name: fa fa-heart
    animated: true
    color: '#ff0000'
